<head>
    <meta charset="UTF-8">
    <title>Phone Region Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 610px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .warning {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            margin-bottom: 15px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .log {
            margin-top: 20px;
            text-align: left;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            height: 500px;
            overflow-y: auto;
        }

        .log-entry {
            border-bottom: 1px solid #333;
            padding: 4px 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-time {
            color: #858585;
            margin-right: 8px;
        }

        .file-link {
            color: #58a6ff;
            text-decoration: underline;
            cursor: pointer;
            word-break: break-all;
        }

        .file-link:hover {
            color: #79c0ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📞 Phone Region Checker</h1>
        <p>Выберите Excel файл с номерами телефонов в колонке A</p>
        <div class="warning">
            ⚠️ ВАЖНО: Закройте Excel-файл перед обработкой и выключите VPN!
        </div>
        <button id="selectBtn">📁 Выбрать Excel файл</button>
        <div class="log" id="log"></div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const logDiv = document.getElementById('log');

        function addLog(message, isProgress = false) {
            let progressEntry = document.getElementById('live-progress-row');

            if (isProgress && progressEntry) {
                const time = new Date().toLocaleTimeString();
                progressEntry.innerHTML = '<span class="log-time">[' + time + ']</span>' + message;
                return
            }

            const entry = document.createElement('div');
            entry.className = 'log-entry';

            if (isProgress) {
                entry.id = 'live-progress-row';
            }

            const time = new Date().toLocaleTimeString();
            entry.innerHTML = '<span class="log-time">[' + time + ']</span>' + message;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        ipcRenderer.on('log-message', (event, message) => {
            addLog(message);
        });

        ipcRenderer.on('progress-message', (event, message) => {
            addLog(message, true);
        });

        document.getElementById('selectBtn').onclick = async () => {
            logDiv.innerHTML = '';

            const result = await ipcRenderer.invoke('select-file');

            if (result && !result.success) {
                addLog('❌ ' + result.message);
            }
        };

        logDiv.addEventListener('click', (e) => {
            if (e.target.classList.contains('file-link')) {
                try {
                    const filePath = JSON.parse(e.target.getAttribute('data-path'));
                    ipcRenderer.send('open-folder-with-file', filePath);
                } catch (err) {
                    addLog('❌ Ошибка при открытии папки: ' + err.message);
                }
            }
        })
    </script>
</body>
